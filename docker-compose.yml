name: alpha

# ─────────────────────────────────────────────────────────────────────────────
#  α ALPHA — docker-compose.yml
#
#  MCP (on-demand, called by .mcp.json):
#    docker compose run --rm -i --no-deps alpha
#
#  Dashboard (persistent, started by install.sh):
#    docker compose --profile dashboard up -d
#    → http://localhost:8080/alpha-dashboard/      (landing + graphify)
#    → http://localhost:5173                       (understand-anything)
#
#  ┌─────────────────────────────────────────────────────────────────────────┐
#  │  Platform quick-reference — copy the right line into your .env file    │
#  │                                                                         │
#  │  macOS Apple Silicon (M1/M2/M3)  →  PLATFORM=linux/arm64              │
#  │  macOS Intel                      →  PLATFORM=linux/amd64              │
#  │  Linux x86-64                     →  PLATFORM=linux/amd64              │
#  │  Linux ARM64                      →  PLATFORM=linux/arm64              │
#  │  Windows x86-64 (Docker Desktop)  →  PLATFORM=linux/amd64              │
#  │                                                                         │
#  │  The binaries in agents-resource/tools/bin/linux/ must match           │
#  │  the chosen PLATFORM arch.  See .env.example for details.              │
#  └─────────────────────────────────────────────────────────────────────────┘
#
#  Env:
#    HOST_PROJECT_ROOT — absolute path to your project root (parent of α/)
#                        macOS/Linux : /absolute/path/to/project
#                        Windows     : C:/path/to/project  (forward slashes)
#    PLATFORM          — container platform (see table above)
#    DASHBOARD_PORT    — nginx port (default: 8080)
#    UNDERSTAND_PORT   — understand dashboard port (default: 5173)
#
#  Prerequisites per OS:
#    macOS   — Docker Desktop ≥ 4.x  (Rosetta or native arm64)
#    Linux   — Docker Engine ≥ 20.x + Compose plugin
#    Windows — Docker Desktop ≥ 4.x + WSL2 backend
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Alpha MCP (stdio, on-demand) ──────────────────────────────────────────
  alpha:
    container_name: alpha
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/Dockerfile.alpha
    volumes:
      - type: bind
        source: ${HOST_PROJECT_ROOT:-.}
        target: /workspace
      - type: bind
        source: ./knowledge-graph/graphify-out
        target: /workspace/α/knowledge-graph/graphify-out
      - type: bind
        source: ./knowledge-graph/understand-anything
        target: /workspace/α/knowledge-graph/understand-anything
    environment:
      - PROJECT_ROOT=/workspace/α
      - ALPHA_ROOT=/workspace
      - ALPHA_IN_DOCKER=1
    working_dir: /workspace/α
    stdin_open: true
    tty: false
    profiles: [mcp]

  # ── Dashboard landing + Graphify static (nginx) ───────────────────────────
  # http://localhost:8080/alpha-dashboard/          → landing page (2 cards)
  # http://localhost:8080/alpha-dashboard/graphify/ → graphify-out/ static files
  dashboard:
    container_name: alpha-dashboard
    image: nginx:alpine
    volumes:
      - type: bind
        source: ${HOST_PROJECT_ROOT:-.}
        target: /workspace
        read_only: true
      - type: bind
        source: ./docker
        target: /usr/share/nginx/html
        read_only: true
      - type: volume
        source: nginx-logs
        target: /var/log/nginx
    command: ["/bin/sh", "-c", "cp /usr/share/nginx/html/dashboard.nginx.conf /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    profiles: [dashboard]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Understand-Anything Dashboard (Vite dev server) ───────────────────────
  # http://localhost:5173
  # Runs: pnpm run dev:dashboard (= pnpm --filter @understand-anything/dashboard dev)
  # from the outer repo root: /root/.understand-anything/repo/understand-anything-plugin/
  understand-server:
    container_name: alpha-understand
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/Dockerfile.alpha
    entrypoint: ["/understand-start.sh"]
    volumes:
      - type: bind
        source: ${HOST_PROJECT_ROOT:-.}
        target: /workspace
      - type: bind
        source: ./knowledge-graph/graphify-out
        target: /workspace/α/knowledge-graph/graphify-out
      - type: bind
        source: ./knowledge-graph/understand-anything
        target: /workspace/α/knowledge-graph/understand-anything
    working_dir: /root/.understand-anything/repo/understand-anything-plugin
    ports:
      - "${UNDERSTAND_PORT:-5173}:5173"
    environment:
      - PROJECT_ROOT=/workspace/α
      - ALPHA_ROOT=/workspace
      - GRAPH_DIR=/workspace
      - BROWSER=none
    profiles: [dashboard]
    restart: unless-stopped

volumes:
  nginx-logs:
