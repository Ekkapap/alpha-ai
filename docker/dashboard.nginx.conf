server {
    listen 80;
    server_name localhost;

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log combined;

    # Redirect bare path
    location = /alpha-dashboard {
        return 301 /alpha-dashboard/;
    }

    # Landing page — http://localhost/alpha-dashboard/
    location = /alpha-dashboard/ {
        root /usr/share/nginx/html;
        try_files /dashboard.html =404;
        add_header Cache-Control "no-store";
    }

    # Graphify static files — graph.html, assets, etc.
    # Direct path into α/knowledge-graph/graphify-out/
    # (project-root/graphify-out is a relative symlink → α/knowledge-graph/graphify-out)
    location /alpha-dashboard/graphify/ {
        alias /workspace/α/knowledge-graph/graphify-out/;
        add_header Cache-Control "no-cache";
    }

    # Understand dashboard token URL — written by understand-start.sh on container startup
    # JS in dashboard.html fetches this to build the card link with the correct token
    location = /alpha-dashboard/understand-url {
        alias /workspace/α/.understand-url;
        default_type text/plain;
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin "*";
    }

    # Health check
    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
