name: alpha-global

# ─────────────────────────────────────────────────────────────────────────────
#  α ALPHA — Global Mode docker-compose
#
#  MCP (alpha):      mounts ALPHA_HOME + HOST_PROJECT_ROOT (per-project, on-demand)
#  Dashboard:        mounts ALPHA_HOME only — all project data lives under
#                    knowledge-graph/projects/[id]/ — no restart needed per project
#
#  Required env vars (set in each project's .mcp.json):
#    ALPHA_HOME        — absolute path to ~/.alpha-ai/
#    HOST_PROJECT_ROOT — absolute path to the project (MCP only)
#    ALPHA_PROJECT_ID  — project ID (e.g. "my-project-a1b2c3d4")
#    PLATFORM          — linux/arm64 or linux/amd64
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Alpha MCP (stdio, on-demand) ──────────────────────────────────────────
  alpha:
    container_name: alpha-global
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/Dockerfile.alpha
    volumes:
      # Global alpha installation + knowledge-graph/projects/
      - type: bind
        source: ${ALPHA_HOME}
        target: /alpha-ai
      # Project being analyzed (for scanning)
      - type: bind
        source: ${HOST_PROJECT_ROOT}
        target: /workspace
    environment:
      - PROJECT_ROOT=/alpha-ai
      - ALPHA_ROOT=/workspace
      - ALPHA_GLOBAL=1
      - ALPHA_PROJECT_ID=${ALPHA_PROJECT_ID}
      - ALPHA_IN_DOCKER=1
    working_dir: /alpha-ai
    stdin_open: true
    tty: false
    profiles: [mcp]

  # ── Dashboard (nginx) ─────────────────────────────────────────────────────
  dashboard:
    container_name: alpha-global-dashboard
    image: nginx:alpine
    volumes:
      - type: bind
        source: ${ALPHA_HOME}
        target: /alpha-ai
        read_only: true
      - type: bind
        source: ${ALPHA_HOME}/docker
        target: /usr/share/nginx/html
        read_only: true
      - type: volume
        source: nginx-logs-global
        target: /var/log/nginx
    command: ["/bin/sh", "-c", "cp /usr/share/nginx/html/dashboard.nginx.conf /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    profiles: [dashboard]
    restart: unless-stopped

  # ── Understand-Anything Dashboard ─────────────────────────────────────────
  understand-server:
    container_name: alpha-global-understand
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: docker/Dockerfile.alpha
    entrypoint: ["/understand-start.sh"]
    volumes:
      # Only ALPHA_HOME — all project graph data is under knowledge-graph/projects/[id]/
      - type: bind
        source: ${ALPHA_HOME}
        target: /alpha-ai
    working_dir: /root/.understand-anything/repo/understand-anything-plugin
    ports:
      - "${UNDERSTAND_PORT:-5173}:5173"
    environment:
      - PROJECT_ROOT=/alpha-ai
      - ALPHA_GLOBAL=1
      - GRAPH_DIR=/alpha-ai
      - BROWSER=none
    profiles: [dashboard]
    restart: unless-stopped

volumes:
  nginx-logs-global:
